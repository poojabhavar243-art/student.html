
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Database</title>
</head>
<body>

<script>

let students = [];
let choice;

function addStudent() {
    let name = prompt("Enter Student Name:");
    students.push(name);
    alert(name + " added successfully!");
}

function removeLastStudent() {
    if (students.length > 0) {
        let removed = students.pop();
        alert(removed + " removed successfully!");
    } else {
        alert("No students to remove!");
    }
}

function showAllStudents() {
    if (students.length === 0) {
        alert("No students found!");
    } else {
        let list = "Student List:\n\n";

        students.forEach(function(student, index) {
            list += (index + 1) + ". " + student + "\n";
        });

        alert(list);
    }
}

function checkStudent() {
    let name = prompt("Enter Student Name to Search:");

    if (students.includes(name)) {
        alert(name + " exists in the database.");
    } else {
        alert(name + " does not exist.");
    }
}

function totalStudents() {
    alert("Total Students = " + students.length);
}

do {

    choice = Number(prompt(
        "===== STUDENT DATABASE =====\n\n" +
        "1. Add Student\n" +
        "2. Remove Last Student\n" +
        "3. Show All Students\n" +
        "4. Check Student Exists\n" +
        "5. Show Total Students\n" +
        "6. Exit\n\n" +
        "Enter your choice:"
    ));

    switch(choice) {

        case 1:
            addStudent();
            break;

        case 2:
            removeLastStudent();
            break;

        case 3:
            showAllStudents();
            break;

        case 4:
            checkStudent();
            break;

        case 5:
            totalStudents();
            break;

        case 6:
            alert("Thank You!");
            break;

        default:
            alert("Invalid Choice!");
    }

} while(choice != 6);

</script>

</body>
</html>
